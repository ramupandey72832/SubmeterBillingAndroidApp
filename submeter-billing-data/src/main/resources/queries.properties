# ==============================================================================
# SQLITE DATABASE SCHEMA PROPERTIES
# App: Submeter Billing Application
# Use: Load these strings directly into your Java/Kotlin database initialization
# ==============================================================================

# Enable Foreign Key Support (Must be executed before creating tables)
schema.enable_foreign_keys=PRAGMA foreign_keys = ON;
schema.disable_foreign_keys=PRAGMA foreign_keys = OFF;

# 1. Tenants Table
schema.create_tenants_table=CREATE TABLE IF NOT EXISTS tenants (\
    tenant_id INTEGER PRIMARY KEY AUTOINCREMENT,\
    name TEXT NOT NULL,\
    phone_number TEXT NOT NULL,\
    aadhar_number TEXT,\
    address TEXT,\
    email TEXT,\
    is_active INTEGER NOT NULL DEFAULT 1 CHECK (is_active IN (0, 1))\
);

# 2. Rooms Table
schema.create_rooms_table=CREATE TABLE IF NOT EXISTS rooms (\
    room_id INTEGER PRIMARY KEY AUTOINCREMENT,\
    room_number TEXT NOT NULL UNIQUE,\
    room_type TEXT,\
    rent_amount REAL NOT NULL DEFAULT 0.0 CHECK (rent_amount >= 0.0)\
);

# 3. Tenancies Table (New: Resolves Room-Tenant Loop and tracks history)
schema.create_tenancies_table=CREATE TABLE IF NOT EXISTS tenancies (\
    tenancy_id INTEGER PRIMARY KEY AUTOINCREMENT,\
    room_id INTEGER NOT NULL,\
    tenant_id INTEGER NOT NULL,\
    start_date TEXT NOT NULL,\
    end_date TEXT,\
    FOREIGN KEY (room_id) REFERENCES rooms(room_id) ON DELETE CASCADE,\
    FOREIGN KEY (tenant_id) REFERENCES tenants(tenant_id) ON DELETE RESTRICT\
);

# 4. Submeters Table
schema.create_submeters_table=CREATE TABLE IF NOT EXISTS submeters (\
    meter_id INTEGER PRIMARY KEY AUTOINCREMENT,\
    room_id INTEGER NOT NULL,\
    meter_serial_number TEXT NOT NULL UNIQUE,\
    initial_reading REAL NOT NULL DEFAULT 0.0 CHECK (initial_reading >= 0.0),\
    is_active INTEGER DEFAULT 1,\
    FOREIGN KEY (room_id) REFERENCES rooms(room_id) ON DELETE CASCADE\
);

# 5. Meter Readings Table
schema.create_meter_readings_table=CREATE TABLE IF NOT EXISTS meter_readings (\
    reading_id INTEGER PRIMARY KEY AUTOINCREMENT,\
    meter_id INTEGER NOT NULL,\
    reading_value REAL NOT NULL CHECK (reading_value >= 0.0),\
    image_url_or_path TEXT,\
    reading_date TEXT NOT NULL DEFAULT CURRENT_TIMESTAMP,\
    FOREIGN KEY (meter_id) REFERENCES submeters(meter_id) ON DELETE CASCADE\
);

# 6. Bills Table (Updated with Tenant, Meter, Room metadata and Fixed Charges)
schema.create_bills_table=CREATE TABLE IF NOT EXISTS bills ( \
    bill_id INTEGER PRIMARY KEY AUTOINCREMENT, \
    previous_reading_id INTEGER, \
    current_reading_id INTEGER NOT NULL, \
    meter_id INTEGER NOT NULL, \
    meter_serial_number TEXT NOT NULL, \
    tenant_id INTEGER, \
    tenant_name TEXT, \
    room_number TEXT NOT NULL, \
    units_consumed REAL NOT NULL CHECK (units_consumed >= 0.0), \
    rate_per_unit REAL NOT NULL CHECK (rate_per_unit >= 0.0), \
    fixed_charge REAL NOT NULL DEFAULT 0.0 CHECK (fixed_charge >= 0.0), \
    total_amount REAL NOT NULL CHECK (total_amount >= 0.0), \
    billing_date TEXT NOT NULL, \
    paid INTEGER NOT NULL DEFAULT 0 CHECK (paid IN (0, 1)), \
    payment_date TEXT, \
    extra_charge REAL DEFAULT 0.0, \
    note TEXT, \
    FOREIGN KEY (previous_reading_id) REFERENCES meter_readings(reading_id) ON DELETE RESTRICT, \
    FOREIGN KEY (current_reading_id) REFERENCES meter_readings(reading_id) ON DELETE RESTRICT \
);

schema.create_bill_summaries_view=CREATE VIEW IF NOT EXISTS view_bill_summaries AS \
SELECT \
    b.bill_id, \
    r.room_number, \
    t.name AS tenant_name, \
    sm.meter_serial_number, \
    mr_prev.reading_value AS previous_reading, \
    mr_curr.reading_value AS current_reading, \
    b.units_consumed, \
    b.rate_per_unit, \
    b.total_amount, \
    b.billing_date, \
    b.paid \
FROM bills b \
JOIN meter_readings mr_curr ON b.current_reading_id = mr_curr.reading_id \
JOIN meter_readings mr_prev ON b.previous_reading_id = mr_prev.reading_id \
JOIN submeters sm          ON mr_curr.meter_id = sm.meter_id \
JOIN rooms r               ON sm.room_id = r.room_id \
LEFT JOIN tenancies ten    ON r.room_id = ten.room_id \
    AND (b.billing_date BETWEEN ten.start_date AND COALESCE(ten.end_date, '9999-12-31')) \
LEFT JOIN tenants t        ON ten.tenant_id = t.tenant_id;

# ==============================================================================
# UPDATED SQLITE QUERIES PROPERTIES (EXPLICIT JOIN VERSION - NO VIEWS)
# ==============================================================================

# Tenant Queries
tenant.insert=INSERT INTO tenants (name, phone_number, aadhar_number, address, email, is_active) VALUES (?, ?, ?, ?, ?, ?)
tenant.get_by_id=SELECT * FROM tenants WHERE tenant_id = ?
tenant.get_all=SELECT * FROM tenants
tenant.get_active=SELECT * FROM tenants WHERE is_active = 1
tenant.update=UPDATE tenants SET name = ?, phone_number = ?, aadhar_number = ?, address = ?, email = ?, is_active = ? WHERE tenant_id = ?
tenant.delete=DELETE FROM tenants WHERE tenant_id = ?
tenant.get_by_aadhar=SELECT * FROM tenants WHERE aadhar_number = ?

# Room Queries
room.insert=INSERT INTO rooms (room_number, room_type, rent_amount) VALUES (?, ?, ?)
room.get_by_id=SELECT * FROM rooms WHERE room_id = ?
room.get_by_number=SELECT * FROM rooms WHERE room_number = ?
room.get_all=SELECT * FROM rooms
room.get_vacant=SELECT * FROM rooms r WHERE r.room_id NOT IN (SELECT room_id FROM tenancies WHERE end_date IS NULL)
room.update=UPDATE rooms SET room_number = ?, room_type = ?, rent_amount = ? WHERE room_id = ?
room.delete=DELETE FROM rooms WHERE room_id = ?

# Tenancies Queries
tenancy.insert=INSERT INTO tenancies (room_id, tenant_id, start_date, end_date) VALUES (?, ?, ?, ?)
tenancy.get_active_by_room=SELECT * FROM tenancies WHERE room_id = ? AND end_date IS NULL
tenancy.get_history_by_room=SELECT * FROM tenancies WHERE room_id = ? ORDER BY start_date DESC
tenancy.get_all=SELECT * FROM tenancies
tenancy.end_contract=UPDATE tenancies SET end_date = ? WHERE room_id = ? AND tenant_id = ? AND end_date IS NULL

# Submeter Queries
submeter.insert=INSERT INTO submeters (room_id, meter_serial_number, initial_reading, is_active) VALUES (?, ?, ?, ?)
submeter.get_by_id=SELECT * FROM submeters WHERE meter_id = ?
submeter.get_by_serial=SELECT * FROM submeters WHERE meter_serial_number = ?
submeter.get_by_room=SELECT * FROM submeters WHERE room_id = ? AND is_active = 1
submeter.get_all=SELECT * FROM submeters
submeter.update=UPDATE submeters SET room_id = ?, meter_serial_number = ?, initial_reading = ?, is_active = ? WHERE meter_id = ?
submeter.delete=DELETE FROM submeters WHERE meter_id = ?

# Meter Reading Queries
reading.insert=INSERT INTO meter_readings (meter_id, reading_value, image_url_or_path, reading_date) VALUES (?, ?, ?, ?)
reading.get_by_id=SELECT * FROM meter_readings WHERE reading_id = ?
reading.get_by_meter=SELECT * FROM meter_readings WHERE meter_id = ? ORDER BY reading_date DESC
reading.get_latest=SELECT * FROM meter_readings WHERE meter_id = ? ORDER BY reading_id DESC LIMIT 1
reading.get_latest_by_serial=SELECT * FROM meter_readings WHERE meter_id IN (SELECT meter_id FROM submeters WHERE meter_serial_number = ?) ORDER BY reading_id DESC LIMIT 1
reading.get_all=SELECT * FROM meter_readings ORDER BY reading_date DESC
reading.update=UPDATE meter_readings SET meter_id = ?, reading_value = ?, image_url_or_path = ?, reading_date = ? WHERE reading_id = ?
reading.delete=DELETE FROM meter_readings WHERE reading_id = ?

# Bill Queries (Streamlined using explicitly stored schema fields)

# Bill Queries (Streamlined using explicitly stored schema fields)

bill.insert=INSERT INTO bills (previous_reading_id, current_reading_id, meter_id, meter_serial_number, tenant_id, tenant_name, room_number, units_consumed, rate_per_unit, fixed_charge, extra_charge, total_amount, note, billing_date, payment_date, paid) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)

bill.get_by_id=SELECT b.* FROM bills b WHERE b.bill_id = ?

bill.get_by_room=SELECT b.* FROM bills b WHERE b.room_number = ?

bill.get_by_tenant=SELECT b.* FROM bills b WHERE b.tenant_name LIKE ? OR b.tenant_id = ?

bill.get_by_status=SELECT b.* FROM bills b WHERE b.paid = ?

bill.get_all=SELECT b.* FROM bills b

bill.get_latest_by_room=SELECT b.* FROM bills b WHERE b.room_number = ? ORDER BY b.bill_id DESC LIMIT 1
bill.get_by_range=SELECT b.* FROM bills b WHERE b.billing_date BETWEEN ? AND ?
bill.get_latest_three_month=SELECT * FROM bills WHERE strftime('%Y-%m', billing_date) IN (SELECT DISTINCT strftime('%Y-%m', billing_date) FROM bills ORDER BY billing_date DESC LIMIT 3 ) ORDER BY billing_date DESC;

bill.update=UPDATE bills SET previous_reading_id = ?, current_reading_id = ?, meter_id = ?, meter_serial_number = ?, tenant_id = ?, tenant_name = ?, room_number = ?, units_consumed = ?, rate_per_unit = ?, fixed_charge = ?, extra_charge = ?, total_amount = ?, note = ?, billing_date = ?, payment_date = ?, paid = ? WHERE bill_id = ?
bill.update_status=UPDATE bills SET payment_date = ?,paid = ? WHERE bill_id = ?
bill.delete=DELETE FROM bills WHERE bill_id = ?

billView.get_all=SELECT * FROM view_bill_summaries
billView.get_by_id=SELECT * FROM view_bill_summaries WHERE bill_id = ?
billView.get_by_room=SELECT * FROM view_bill_summaries WHERE room_number = ?
billView.get_by_tenant=SELECT * FROM view_bill_summaries WHERE tenant_name LIKE ?
billView.get_by_status=SELECT * FROM view_bill_summaries WHERE paid = ?


# ==============================================================================
# SCHEMA CLEANUP / RESET QUERIES
# ==============================================================================

# Drop View (Must happen before dropping underlying tables)
schema.drop_bill_summaries_view=DROP VIEW IF EXISTS view_bill_summaries;

# Drop Tables in strict dependency order (Child dependencies first)
schema.drop_bills_table=DROP TABLE IF EXISTS bills;
schema.drop_meter_readings_table=DROP TABLE IF EXISTS meter_readings;
schema.drop_submeters_table=DROP TABLE IF EXISTS submeters;
schema.drop_tenancies_table=DROP TABLE IF EXISTS tenancies;
schema.drop_rooms_table=DROP TABLE IF EXISTS rooms;
schema.drop_tenants_table=DROP TABLE IF EXISTS tenants;